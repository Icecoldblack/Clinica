server.port=8080
spring.application.name=clinica

# Gemini
gemini.api.key=${GOOGLE_API_KEY:}
gemini.model=gemini-3-flash-preview
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta/models

# Google Maps
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
google.maps.base-url=https://maps.googleapis.com/maps/api

# Hospital search — use a faster/cheaper model since enrichment is a single batch call
gemini.hospital.model=gemini-3-flash-preview
